server {
    listen 8686;
    server_name _;

    client_max_body_size 5g;

    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;

    location /dv/ {
        rewrite ^/dv/(.*)$ /$1 break;
        proxy_pass http://192.168.191.168:3456;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    location /tv/ {
        rewrite ^/tv/(.*)$ /$1 break;
        proxy_pass http://192.168.191.168:6789;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }
}