version: "3"
services:
  hertzbeat:
    image: apache/hertzbeat:latest
    container_name: hertzbeat
    ports:
      - "1157:1157"
    volumes:
      - ./hertzbeat-data:/data
    restart: unless-stopped

# 默认账号密码 admin  hertzbeat

# 生成 SSH key
# 把 HertzBeat 容器的公钥拷出来  
# 1️⃣ 进入容器 
# docker exec -it hertzbeat bash  
#  如果不是 bash，用 sh：
# docker exec -it hertzbeat sh 
# 2️⃣ 生成 SSH key（一路回车即可）
# ssh-keygen -t rsa -b 4096 -f /root/.ssh/id_rsa -N ""    


# 执行后会生成：
# /root/.ssh/id_rsa
# /root/.ssh/id_rsa.pub

# 打印
# cat /root/.ssh/id_rsa.pub


# 二、把公钥加到「被监控服务器」

# mkdir -p ~/.ssh
# chmod 700 ~/.ssh
# nano ~/.ssh/authorized_keys

# 粘贴刚才那一行公钥
# chmod 600 ~/.ssh/authorized_keys

##四、测试连通性（强烈建议） 
# 在 HertzBeat 容器里手动连一次：
# docker exec -it hertzbeat ssh apple@192.168.191.20



